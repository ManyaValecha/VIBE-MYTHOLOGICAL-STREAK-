<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Security: Prevent MIME sniffing -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <!-- Security: Prevent embedding in iframes (clickjacking protection) -->
    <meta http-equiv="X-Frame-Options" content="DENY" />
    <!-- Security: Referrer Policy -->
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <title>ViBe Mythology Streak Portal</title>
    <script>
      // Global polyfill for PouchDB / other third-party libraries in browser
      if (typeof global === 'undefined') {
        window.global = window;
      }

      // Safe helper to display error text WITHOUT using innerHTML (XSS prevention)
      function showErrorOverlay(label, message, stack) {
        setTimeout(function() {
          var div = document.getElementById('runtime-error-overlay');
          if (!div) {
            div = document.createElement('div');
            div.id = 'runtime-error-overlay';
            div.style.cssText = 'position:fixed;top:0;left:0;width:100%;max-height:50vh;overflow-y:auto;background:#7f1d1d;color:#fecaca;padding:15px;font-family:monospace;font-size:12px;z-index:999999;white-space:pre-wrap;border-bottom:3px solid #dc2626;';
            document.body.appendChild(div);
          }
          // Use textContent to safely insert text — never innerHTML with untrusted data
          div.textContent = '[' + label + '] ' + message + (stack ? '\n' + stack : '');
        }, 100);
      }

      var BENIGN_PATTERNS = ['WebSocket', 'closed without opened', 'vite', 'HMR'];
      function isBenign(msg) {
        return BENIGN_PATTERNS.some(function(p) { return msg && msg.indexOf(p) !== -1; });
      }

      // Visual Error Boundary to render any browser-side JS crashes directly on the screen
      window.addEventListener('error', function(e) {
        var msg = e.message || '';
        if (isBenign(msg)) return;
        showErrorOverlay('Runtime Error', msg + ' at ' + e.filename + ':' + e.lineno, e.error ? e.error.stack : '');
      });

      window.addEventListener('unhandledrejection', function(e) {
        var reason = e.reason;
        var msg = '';
        if (reason) {
          msg = typeof reason === 'string' ? reason : (reason.message || '');
        }
        if (isBenign(msg)) return;
        showErrorOverlay('Unhandled Rejection', msg, reason && reason.stack ? reason.stack : '');
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
